<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelEase - Online Ticket Booking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        nav a {
            margin-left: 25px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #667eea;
        }

        .main-content {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .booking-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-btn {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .results-section {
            display: none;
            margin-top: 30px;
        }

        .results-section.active {
            display: block;
        }

        .ticket-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #667eea;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .ticket-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .ticket-info {
            flex: 1;
        }

        .route {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .details {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .price {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-right: 20px;
        }

        .book-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .book-btn:hover {
            background: #5568d3;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .close-btn {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }

        .confirmation {
            background: #e8f5e9;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #4caf50;
        }

        .confirmation h3 {
            color: #2e7d32;
            margin-bottom: 10px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }

        .confirm-booking-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .confirm-booking-btn:hover {
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
            }

            nav {
                margin-top: 15px;
            }

            nav a {
                margin: 0 10px;
            }

            .ticket-card {
                flex-direction: column;
                align-items: flex-start;
            }

            .price {
                margin: 15px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🚌 TravelEase</div>
            <nav>
                <a href="#home">Home</a>
                <a href="#bookings">My Bookings</a>
                <a href="#contact">Contact</a>
            </nav>
        </header>

        <div class="main-content">
            <h1>Book Your Journey</h1>
            <p class="subtitle">Find and book tickets for buses, trains, and flights</p>

            <form class="booking-form" id="searchForm">
                <div class="form-group">
                    <label for="from">From</label>
                    <input type="text" id="from" placeholder="Enter departure city" required>
                </div>

                <div class="form-group">
                    <label for="to">To</label>
                    <input type="text" id="to" placeholder="Enter destination city" required>
                </div>

                <div class="form-group">
                    <label for="date">Date of Journey</label>
                    <input type="date" id="date" required>
                </div>

                <div class="form-group">
                    <label for="transport">Mode of Transport</label>
                    <select id="transport" required>
                        <option value="">Select</option>
                        <option value="bus">Bus</option>
                        <option value="train">Train</option>
                        <option value="flight">Flight</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="passengers">Number of Passengers</label>
                    <input type="number" id="passengers" min="1" max="10" value="1" required>
                </div>

                <button type="submit" class="search-btn">Search Tickets</button>
            </form>

            <div class="results-section" id="resultsSection">
                <h2 style="margin-bottom: 20px; color: #333;">Available Tickets</h2>
                <div id="ticketsList"></div>
            </div>
        </div>
    </div>

    <!-- Booking Modal -->
    <div class="modal" id="bookingModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-header">Complete Your Booking</div>
            
            <form id="bookingDetailsForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" required>
                </div>

                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" min="1" max="120" required>
                </div>

                <div id="bookingSummary"></div>

                <button type="submit" class="confirm-booking-btn">Confirm Booking</button>
            </form>
        </div>
    </div>

    <script>
        // Sample ticket data
        const ticketData = {
            bus: [
                { id: 1, name: 'Express Bus', departure: '06:00 AM', arrival: '12:00 PM', duration: '6h', price: 450 },
                { id: 2, name: 'Deluxe AC Bus', departure: '09:00 AM', arrival: '03:30 PM', duration: '6.5h', price: 650 },
                { id: 3, name: 'Sleeper Bus', departure: '10:00 PM', arrival: '05:00 AM', duration: '7h', price: 800 }
            ],
            train: [
                { id: 4, name: 'Rajdhani Express', departure: '07:30 AM', arrival: '01:00 PM', duration: '5.5h', price: 850 },
                { id: 5, name: 'Shatabdi Express', departure: '02:00 PM', arrival: '07:00 PM', duration: '5h', price: 1200 },
                { id: 6, name: 'Jan Shatabdi', departure: '05:30 AM', arrival: '11:00 AM', duration: '5.5h', price: 600 }
            ],
            flight: [
                { id: 7, name: 'Air India', departure: '06:00 AM', arrival: '08:30 AM', duration: '2.5h', price: 3500 },
                { id: 8, name: 'IndiGo', departure: '11:00 AM', arrival: '01:15 PM', duration: '2.25h', price: 3200 },
                { id: 9, name: 'SpiceJet', departure: '04:00 PM', arrival: '06:30 PM', duration: '2.5h', price: 2900 }
            ]
        };

        let currentBooking = null;

        // Set minimum date to today
        document.getElementById('date').min = new Date().toISOString().split('T')[0];

        // Search form submission
        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;
            const date = document.getElementById('date').value;
            const transport = document.getElementById('transport').value;
            const passengers = document.getElementById('passengers').value;

            if (transport) {
                displayTickets(transport, from, to, date, passengers);
            }
        });

        function displayTickets(transport, from, to, date, passengers) {
            const resultsSection = document.getElementById('resultsSection');
            const ticketsList = document.getElementById('ticketsList');
            
            const tickets = ticketData[transport];
            
            ticketsList.innerHTML = '';
            
            tickets.forEach(ticket => {
                const totalPrice = ticket.price * parseInt(passengers);
                const card = document.createElement('div');
                card.className = 'ticket-card';
                card.innerHTML = `
                    <div class="ticket-info">
                        <div class="route">${from} → ${to}</div>
                        <div class="details">🚍 ${ticket.name}</div>
                        <div class="details">⏰ ${ticket.departure} - ${ticket.arrival} (${ticket.duration})</div>
                        <div class="details">👥 ${passengers} passenger(s)</div>
                    </div>
                    <div class="price">₹${totalPrice}</div>
                    <button class="book-btn" onclick='openBookingModal(${JSON.stringify({
                        ...ticket,
                        from,
                        to,
                        date,
                        passengers,
                        totalPrice
                    })})'>Book Now</button>
                `;
                ticketsList.appendChild(card);
            });
            
            resultsSection.classList.add('active');
        }

        function openBookingModal(booking) {
            currentBooking = booking;
            const modal = document.getElementById('bookingModal');
            const summary = document.getElementById('bookingSummary');
            
            summary.innerHTML = `
                <div class="confirmation">
                    <h3>Booking Summary</h3>
                    <div class="summary-item">
                        <span>Route:</span>
                        <strong>${booking.from} → ${booking.to}</strong>
                    </div>
                    <div class="summary-item">
                        <span>Service:</span>
                        <strong>${booking.name}</strong>
                    </div>
                    <div class="summary-item">
                        <span>Date:</span>
                        <strong>${booking.date}</strong>
                    </div>
                    <div class="summary-item">
                        <span>Time:</span>
                        <strong>${booking.departure} - ${booking.arrival}</strong>
                    </div>
                    <div class="summary-item">
                        <span>Passengers:</span>
                        <strong>${booking.passengers}</strong>
                    </div>
                    <div class="summary-item">
                        <span>Total Amount:</span>
                        <strong style="color: #667eea; font-size: 20px;">₹${booking.totalPrice}</strong>
                    </div>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('bookingModal').classList.remove('active');
            document.getElementById('bookingDetailsForm').reset();
        }

        // Booking confirmation
        document.getElementById('bookingDetailsForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const bookingId = 'BK' + Math.floor(Math.random() * 1000000);
            
            alert(`🎉 Booking Confirmed!\n\nBooking ID: ${bookingId}\nPassenger: ${name}\nEmail: ${email}\n\nA confirmation email has been sent to ${email}`);
            
            closeModal();
        });

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('bookingModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
